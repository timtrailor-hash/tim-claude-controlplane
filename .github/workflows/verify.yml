name: verify
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  portable-scenarios:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install pytest pyyaml
      - name: Wire shared hooks to ~/.claude/hooks
        run: |
          mkdir -p "$HOME/.claude"
          ln -sfn "$GITHUB_WORKSPACE/shared/hooks" "$HOME/.claude/hooks"
      - name: Run portable scenarios
        run: |
          python -m pytest -v \
            scenarios/test_behavioral.py \
            scenarios/drift/test_git_hooks_installed.py::test_hook_installer_exists \
            scenarios/drift/test_git_hooks_installed.py::test_hook_sources_exist \
            scenarios/drift/test_git_hooks_installed.py::test_pre_commit_enforces_ratchet \
            scenarios/drift/test_git_hooks_installed.py::test_pre_push_runs_verify \
            scenarios/drift/test_monolith_ratchet.py::test_conversation_server_under_ceiling \
            scenarios/drift/test_monolith_ratchet.py::test_ceiling_is_realistic

      # Gemini R1 #2: when main is red, alert immediately — don't wait for
      # the Monday digest. Uses the public ntfy topic; message is generic
      # enough to leak no internal paths.
      - name: Alert on main failure
        if: failure() && github.ref == 'refs/heads/main'
        run: |
          curl -sS -X POST \
            -H "Title: CI RED on main (tim-claude-controlplane)" \
            -H "Priority: 5" \
            -H "Tags: rotating_light,warning" \
            -d "verify.yml failed on push to main. Commit ${GITHUB_SHA::7}. Run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            https://ntfy.sh/timtrailor-claude

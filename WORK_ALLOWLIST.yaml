# WORK_ALLOWLIST.yaml — what work-side Claude (Copilot CLI on the work laptop)
# is permitted to read from the tim-claude-controlplane repo.
#
# Policy: deny-by-default. Only paths listed under `allow:` are visible to the
# work side. Anything outside `shared/` is implicitly denied.
#
# Why this exists:
#   - Source: memory/topics/work-claude-integration.md (Step 1).
#   - The work side gets shared rules, generic agents, and review/second-opinion
#     skills. It must NEVER see printer code, infrastructure topology, Mac Mini
#     paths, governors data, autofaizal/Funding-Circle pipelines, or anything
#     that touches local creds, daemons, or the home network.
#   - Directory split into shared/ vs personal/ is deferred to a later polish.
#     For now this manifest enumerates per-file what the work side may read.
#
# Enforcement:
#   - v1 (today): manifest only. Audited at deploy time during step 6/7 when
#     the work-side helper is wired up.
#   - v2 (later): used by a sync script that materialises a work-side checkout
#     containing exclusively the listed files.
#
# How to update:
#   1. Decide the file is genuinely generic (no IPs, no paths under
#      ~/code/ or ~/Documents/, no printer/governors/family content, no
#      Mac-Mini-only daemons or LaunchAgent references).
#   2. Add it under the appropriate `allow:` group with a one-line reason.
#   3. PR through /review like any other change.

policy_version: 1
last_updated: "2026-04-30"
default: deny

# Files the work side may read. Globs not supported in v1 — list every file
# explicitly so adding a new file under e.g. shared/skills/ requires an
# affirmative allowlist edit.
allow:
  rules:
    - path: shared/rules/security.md
      reason: API-key handling, repo hygiene rules, auth-helper backup pattern. Generic.
    - path: shared/rules/reply-style.md
      reason: "CEO + ADHD reply rules. Em-dash scoped to external output, max-3-questions per reply, no time estimates, no deferral phrases. Generic, no personal refs. Added 2026-05-01 after Tim asked both systems to share the guidance."

  agents:
    - path: shared/agents/silent-failure-hunter.md
      reason: "Slice H 2026-05-01: printer §6 sub-section removed, ntfy/SMTP refs replaced with the project's alert channel, named scripts replaced with generic 'long-running monitor' descriptors. Generic silent-failure scanner."
    - path: shared/agents/code-reviewer.md
      reason: "Slice H 2026-05-01: 8-point checklist + Pattern 1 5-question gate, with printer/Klipper specifics generalised to 'external system commands' and three-location code-tree drift replaced with single-canonical-tree guidance. credentials.py reference dropped in favour of the env→Keychain resolver."
    - path: shared/agents/architect-auditor.md
      reason: "Slice H 2026-05-01: hardcoded ~/.claude/projects/-Users-timtrailor-* paths and ssh timtrailor@192.168.0.172 removed. References memory/topics under shared/work-topics/. 'If present' tolerance for architecture-plan.md/system-rebuild.md so the work side does not hard-fail on missing files."
    - path: shared/agents/second-opinion.md
      reason: "Slice H 2026-05-01: credentials.py disk probe replaced with env→Keychain (WORK_<NAME> first then bare <NAME>) resolver. ask_gemini and ask_chatgpt early-return on missing key. Dual-model parallel threading + cost table + synthesis output format kept."

  skills:
    - path: shared/skills/review/SKILL.md
      reason: /review pipeline (ruff + semgrep + reviewer subagents + auto-merge). Repo-agnostic logic. References `~/.claude/hooks/sensitivity_check.sh` — work side will ship its own stub or no-op when the work-side helper is wired up in step 7.
    - path: shared/skills/chatgpt/SKILL.md
      reason: "Independent ChatGPT reviewer. 2026-05-01 phase-2 slice C: credentials.py probe replaced with env then Keychain (WORK_OPENAI_API_KEY then OPENAI_API_KEY) then credentials.py fallback resolver. Works on both sides."
    - path: shared/skills/gemini/SKILL.md
      reason: Independent Gemini reviewer. Same env/Keychain/credentials.py resolver as chatgpt; uses GEMINI_API_KEY accounts.
    - path: shared/skills/debate/SKILL.md
      reason: Three-way Claude/Gemini/ChatGPT debate. Same shared resolver pattern. The grep-over-~/code/~/.claude scope walk inside debate body still mentions personal paths but works on either side because the directories exist on both.

  work_topics:
    # Sanitised topic-memory files (slice L1, 2026-05-01). Behavioural feedback
    # rules and the shared work-bridge phase-2 plan. Frontmatter scope: shared,
    # no personal IPs/paths/hardware/family/governance refs. work_setup.sh
    # Section L rsyncs every *.md (except README) into the work-side project
    # memory/topics/ and triggers a re-index. Per-file enumeration matches the
    # v1 policy stated at the top of this file: every new file added under
    # shared/work-topics/ requires its own affirmative allowlist edit.
    - path: shared/work-topics/README.md
      reason: Directory README. Documents the sanitisation rules and the sync mechanism. Excluded from rsync to the work side; allowlist entry exists so a /review on the directory does not flag it.
    - path: shared/work-topics/feedback_no_deferring.md
      reason: Behavioural rule. No "logged for later" / "TODO" / deferral phrases. Generic.
    - path: shared/work-topics/feedback_no_time_estimates.md
      reason: Behavioural rule. No human time-duration estimates for Claude's work. Generic.
    - path: shared/work-topics/feedback_em_dash_terminal_exempt.md
      reason: Em-dash rule scoped to external output only. References Tim's two email addresses as the boundary between internal and external. Generic.
    - path: shared/work-topics/feedback_plain_english.md
      reason: Plain-English glossary, banned/translated git/oauth/CS vocabulary. Generic.
    - path: shared/work-topics/feedback_response_structure.md
      reason: Reply structure (one ask per bullet, max 3 asks per response, headline first). Generic.
    - path: shared/work-topics/feedback_response_gate.md
      reason: Response-gate hook rationale. Mentions hook path under shared/hooks/, no personal infra. Generic.
    - path: shared/work-topics/feedback_verify_before_claiming.md
      reason: Verify-before-claiming-success rule. Generic.
    - path: shared/work-topics/feedback_read_before_overwrite.md
      reason: Don't full-rewrite shared documents without reading first. Generic.
    - path: shared/work-topics/feedback_test_before_shipping.md
      reason: Test-before-shipping rule. Generic.
    - path: shared/work-topics/feedback_test_before_sharing.md
      reason: Test-before-sharing-with-Tim rule. Generic.
    - path: shared/work-topics/work-bridge-phase2-plan.md
      reason: Shared phase-2 plan (slices A-D); both sides treat as truth. No personal infra refs after sanitisation pass.
    # L2 batch (2026-05-01): heavier sanitised topics so the work-side reviewer
    # subagent and skills have institutional context (lessons, quality toolchain,
    # memory architecture, work-side credentials inventory, work-context profile
    # and session checklist).
    - path: shared/work-topics/lessons.md
      reason: Sanitised work-relevant subset of incident patterns (13 patterns, 209 lines). Printer/governors/family/Mac-Mini specifics dropped. Read by the code-reviewer subagent during /review.
    - path: shared/work-topics/quality-toolchain.md
      reason: /review pipeline + reviewer roster + lint hook + response-gate. Generic, no personal infra. 81 lines.
    - path: shared/work-topics/memory-system.md
      reason: ChromaDB + FTS5 architecture + scope frontmatter + bridge filter + three-query-shape rule. Generic. 169 lines.
    - path: shared/work-topics/credentials-keychain-work.md
      reason: Keychain inventory for the work side (work-only key names + resolver pattern + rotation runbook). Personal keys never appear.
    - path: shared/work-topics/user_profile-work.md
      reason: Tim's profile rewritten for the work-laptop context (CEO + ADHD + bridge endpoints). No personal devices or hardware.
    - path: shared/work-topics/session-instructions-work.md
      reason: Session-start checklist for the work side. Confirms bridge MCP, memory MCP, slash skills, and reads the canonical phase-2 plan. No personal-side refs.

# Explicit deny list — not required (default is deny) but documented here so
# the reasoning behind sensitive-but-tempting paths is captured. If a future
# edit moves one of these to allow:, the diff makes the policy change visible.
deny_explicit:
  - path: shared/rules/operational.md
    reason: Body's "Before Saying I Can't" checklist contains an imperative `ssh timtrailor@100.126.253.40` step. Work-Claude reading this rule would attempt outbound SSH to the home Tailscale IP from the corporate laptop — leaks topology, may trip DLP/EDR, violates the no-Mac-Mini-control anti-goal. Defer until directory split produces a sanitised work-operational.md without the SSH escape-hatch. (review/SKILL.md already covers the autonomous-merge / plan-mode rules the work side actually needs.)
  - path: shared/rules/printer-safety.md
    reason: Printer command allowlist + hardware safety. Personal-only.
  - path: shared/rules/infrastructure.md
    reason: Tailscale IPs, Mac Mini hostnames, ~/code/ vs ~/Documents/Claude code/ paths. Topology.
  - path: shared/policies/
    reason: printer_policy.yaml (printer IPs/macros) + degraded_modes.yaml (home-network state machine).
  - path: shared/config/printer_config.toml
    reason: Printer config.
  - path: shared/hooks/
    reason: All hooks are Mac-Mini-resident daemons or memory/printer-bound. None are useful on the work laptop and most reference local paths.
  - path: shared/lib/
    reason: system_map.py / system_inventory.sh / live_acceptance.sh — home infrastructure introspection.
  - path: shared/mcp-launchers/
    reason: Hardcoded ~/code/ paths for local MCP binaries.
  - path: shared/git-hooks/
    reason: Pre-commit/pre-push for the personal monorepo (ratchet ceiling, drift detection). Not relevant to work-laptop repos.
  # architect-auditor / code-reviewer / second-opinion moved to allow.agents on
  # 2026-05-01 (slice H): hardcoded personal-side paths and credentials.py disk
  # probes replaced with controlplane-relative paths and the env→Keychain
  # resolver. See allow.agents above for the per-file reasons.
  # chatgpt/gemini/debate moved to allow.skills on 2026-05-01 (slice C):
  # the credentials.py probe was replaced with a env → Keychain →
  # credentials.py fallback resolver that works on both sides.
  - path: shared/skills/screenshot/SKILL.md
    reason: Hardcodes `/Users/timtrailor/Library/CloudStorage/GoogleDrive-tim.trailor@envisso.com/...` as both the instruction-file path and the output directory. Not usable on the work laptop without rewrite.
  - path: shared/skills/printer/
    reason: SV08 Max printer agent.
  - path: shared/skills/printer-send/
    reason: G-code choke-point wrapper.
  - path: shared/skills/audit-daemons/
    reason: Mac Mini LaunchAgent auditor.
  - path: shared/skills/compliance/
    reason: Acceptance-test compliance score for home system.
  - path: shared/skills/drift-check/
    reason: Laptop ↔ Mac Mini code drift checker.
  - path: shared/skills/lessons-check/
    reason: Pattern-match against lessons.md (printer/daemon-specific incidents).
  - path: shared/skills/secure-delete/
    reason: Wipes session artefacts on Mac Mini including topic memory.
  - path: shared/skills/rotate-token/
    reason: Token rotation against personal credentials.py / Keychain entries.
  - path: shared/skills/autonomous/
    reason: Persistent runner that emails Tim via personal SMTP creds. Personal only in v1; revisit if work needs background tasks.
  - path: shared/skills/memory/
    reason: Tied to a personal-side memory backend. Work side runs its own memory; cross-environment memory queries are handled by the bridge layer per the integration plan, not by exposing this skill's body.
  - path: shared/skills/createoutput/
    reason: Funding-Circle pipeline output writer. Default deny in v1.
  - path: shared/skills/autofaizal/
    reason: Merchant risk model v12 (work-domain but currently runs on Mac Mini). Default deny in v1.
  - path: shared/skills/superfaizal/
    reason: Same as autofaizal.
  - path: shared/skills/merchantriskassessment/
    reason: Same as autofaizal.
  - path: shared/skills/markdown/
    reason: Jina-API markdown fetcher tied to autofaizal pipeline + Drive saving.
  - path: shared/skills/markdown_modeloptimised/
    reason: Same.
  - path: shared/skills/MD2Features/
    reason: Same.
  - path: shared/skills/MD2Features_modeloptimised/
    reason: Same.
  - path: shared/skills/transactionmetrics/
    reason: Databricks queries against personal-machine creds.
  - path: shared/skills/transactionmetrics_modeloptimised/
    reason: Same.
  - path: shared/skills/claudedirect2features/
    reason: Same pipeline family.

  # Repo-level paths outside shared/ — all denied implicitly, listed here for
  # reviewer clarity.
  - path: machines/
    reason: Per-host settings.json + LaunchAgent plists. Topology.
  - path: hosts/
    reason: Per-host manifests.
  - path: scenarios/
    reason: Acceptance tests pinned to home-system state (printer IPs, daemons).
  - path: scripts/
    reason: ios-build-and-install.sh, ci_failure_poller.py — personal infra.
  - path: docs/
    reason: ios-build-pipeline + retrospective. Personal infra.
  - path: deploy.sh
    reason: Mac Mini deploy script.
  - path: rollback.sh
    reason: Same.
  - path: verify.sh
    reason: Same.
  - path: diff-live.sh
    reason: Same.
